<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM PROJECTS</title>
    <style>
        :root {
            --p5-red: #d31212;
            --p5-black: #000000;
            --p5-white: #ffffff;
            --p5-gray: #222222;
        }

        /* 派手な背景アニメーション */
        body { 
            background-color: var(--p5-black);
            background-image: 
                linear-gradient(45deg, var(--p5-red) 25%, transparent 25%),
                linear-gradient(-45deg, var(--p5-red) 25%, transparent 25%);
            background-size: 100px 100px;
            background-attachment: fixed;
            color: var(--p5-white);
            font-family: 'Arial Black', sans-serif; /* 勢いのあるフォント */
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* 斜めの背景オーバーレイ */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 150%; height: 150%;
            background: rgba(0,0,0,0.8);
            transform: rotate(-5deg) translate(-10%, -10%);
            z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; position: relative; }

        header { 
            margin-bottom: 4rem; 
            transform: rotate(-2deg); 
            text-align: left;
        }

        /* P5風の切り抜きタイトル */
        h1 { 
            font-size: 4rem; 
            font-weight: 900; 
            text-transform: uppercase;
            background: var(--p5-white);
            color: var(--p5-black);
            display: inline-block;
            padding: 0 20px;
            transform: skewX(-10deg);
            box-shadow: 10px 10px 0 var(--p5-red);
        }

        #repo-list { display: grid; gap: 2rem; }

        /* カードデザインを大胆に */
        .card {
            background: var(--p5-white);
            color: var(--p5-black);
            padding: 0;
            display: flex;
            gap: 0;
            text-decoration: none;
            transform: skewX(-5deg); /* 全体を斜めに */
            transition: all 0.3s ease;
            border: 4px solid var(--p5-black);
            overflow: hidden;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: skewX(-5deg) scale(1.05);
            box-shadow: 20px 20px 0 var(--p5-red);
            z-index: 10;
        }

        /* アイコン部分の斜め切り抜き */
        .card-icon-wrapper {
            width: 140px;
            height: 140px;
            background: var(--p5-black);
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
            flex-shrink: 0;
        }

        .card-icon {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.2); /* 白黒でクールに */
            transition: 0.3s;
        }

        .card:hover .card-icon { filter: none; }

        .card-body { 
            flex: 1; padding: 1rem; 
            transform: skewX(5deg); /* テキストの歪みを戻す */
        }

        .card-title { 
            font-size: 1.5rem; font-weight: 900; 
            background: var(--p5-black);
            color: var(--p5-white);
            padding: 5px 15px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .card-desc { font-size: 0.9rem; margin-bottom: 1rem; font-weight: bold; }

        .tags { display: flex; gap: 0.5rem; }
        .tag { 
            background: var(--p5-red); 
            color: white; 
            padding: 2px 10px; 
            font-size: 0.7rem; 
            transform: rotate(-2deg);
        }

        .meta { 
            margin-top: 1rem; font-size: 0.8rem; text-align: right; font-style: italic;
        }

        /* 手書き風の装飾 */
        .card::after {
            content: 'TAKE YOUR HEART';
            position: absolute;
            bottom: -5px; right: 10px;
            font-size: 0.6rem;
            color: var(--p5-red);
            opacity: 0.5;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>My Archives</h1>
    </header>

    <main id="repo-list"></main>
</div>

<script>
    const CONFIG = {
        username: 'wiskerpaddy',
        defaultBranch: 'main'
    };

    async function init() {
        const listEl = document.getElementById('repo-list');
        try {
            const res = await fetch('./data.json');
            const repos = await res.json();
            listEl.innerHTML = repos.map(repo => renderCard(repo)).join('');
        } catch (err) {
            listEl.innerHTML = 'DATA NOT FOUND';
        }
    }

    function renderCard(repo) {
        const iconUrl = `https://raw.githubusercontent.com/${CONFIG.username}/${repo.name}/${CONFIG.defaultBranch}/icon.png`;
        const pushedDate = new Date(repo.pushed_at).toLocaleDateString('ja-JP');
        const pagesUrl = `https://${CONFIG.username}.github.io/${repo.name}/`;

        return `
            <a href="${pagesUrl}" class="card" target="_blank">
                <div class="card-icon-wrapper">
                    <img src="${iconUrl}" class="card-icon" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=?'" alt="">
                </div>
                <div class="card-body">
                    <span class="card-title">${repo.name}</span>
                    <p class="card-desc">${repo.description || 'MISSION UNKNOWN'}</p>
                    <div class="tags">
                        ${(repo.topics || []).map(t => `<span class="tag">#${t}</span>`).join('')}
                    </div>
                    <div class="meta">Captured at: ${pushedDate}</div>
                </div>
            </a>
        `;
    }
    init();
</script>
</body>
</html>
